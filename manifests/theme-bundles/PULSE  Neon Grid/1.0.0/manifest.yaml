longDescription: |
    # PULSE - Neon Grid
  
    ## Description
    A synthwave neon-grid look for your control panel. Magenta and cyan glow over a
    deep-violet void, with a retro perspective grid, scanline textures, and softly
    pulsing neon edges. Ships as a **Theme + Template bundle**
  
    ## Key Features
    - Animated login
    - Restyled shell
    - Branded drawer
    - Live footer
    - Custom loading screen
    - Dark / light aware
  
    ## What's new
    - **1.0.0** — Initial release.
