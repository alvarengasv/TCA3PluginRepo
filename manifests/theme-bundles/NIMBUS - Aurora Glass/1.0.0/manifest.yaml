name: "NIMBUS - Aurora Glass"
version: "1.0.0"
minimumApplicationVersion: "3.6"
author: "TCAdmin"
shortDescription: "A premium \"aurora glass\" theme: frosted panels over an animated aurora"
longDescription: |
  # NIMBUS - Aurora Glass
  
  ## Description
  A premium "aurora glass" look for your control panel. Frosted, translucent panels float over a soft aurora, finished with gradient  accents, gentle glows, and generous rounded corners. Ships as a **Theme +
    Template bundle**
  
    ## Key Features
    - Animated login
    - Restyled shell
    - Branded drawer
    - Live footer
    - Custom loading screen
    - Dark / light aware
  
    ## What's new
    - **1.0.0** — Initial release.

    ## Instructions
    - **To enable advanced effects**  — Go to Theme > Advanced and enable Allow unsafe template content
  
