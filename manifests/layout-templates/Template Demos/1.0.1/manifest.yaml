shortDescription: "A reference template demoing every layout surface"
longDescription: |
  # Template Demos
  
  ## Description
  A reference template demoing every layout surface — LoginPage, a custom hand-rolled Shell, and all eight Shell regions (TopBar, Drawer header/footer, Before/After content, Footer, MenuLinks). Shows how to combine {% component %}, {% surface %}, and model variables. Great for learning the layout system and as a scaffold to copy from.
    ## Instructions
    - Go to Settings > Themes > Select your current theme > Advanced.
    - Under "Layout Template" select "Template Demos".
    - Save and reload the page.
  
  ## What's new
  - Game service and Docker service home template
